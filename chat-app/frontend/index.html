<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Onur's Chat App</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">

        <h1>💬 Onur's Chat App</h1>

        <div id="messages"></div>

        <form id="chat-form">

            <input
                type="text"
                id="username"
                placeholder="Username"
                required
            >

            <input
                type="text"
                id="message"
                placeholder="Type your message..."
                required
            >

            <button type="submit">
                Send
            </button>

        </form>

        <p id="status"></p>

    </div>

    <script src="script.js"></script>

</body>
</html>
